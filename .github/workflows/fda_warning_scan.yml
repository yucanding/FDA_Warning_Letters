name: FDA Warning Letters Monitor

on:
  # 保留手动触发接口，cron-job.org 调用的就是这个
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4，性能更好

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5，更稳定
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance lxml deep_translator

      - name: Run Warning Letters Scanner
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python fda_warning_scanner.py

      - name: Commit and Push Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          touch seen_warning_letters.txt
          git add seen_warning_letters.txt
          # 只有在数据库有变化时才提交，防止空提交报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Warning Letters DB" && git push)
