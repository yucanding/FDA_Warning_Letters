name: FDA Warning Letters Monitor

on:
  schedule:
    # 每周二 (2) 执行
    # 分钟设定为: 10,15,20,25,30
    # 小时设定为: 13 (对应夏令时 09:xx)
    - cron: '10,15,20,25,30 13 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance lxml deep-translator

      - name: Run Warning Letters Scanner
        env:
          # 直接复用你仓库已有的 Secrets
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python fda_warning_scanner.py

      - name: Commit and Push Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          touch seen_warning_letters.txt
          git add seen_warning_letters.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Warning Letters DB" && git push)
