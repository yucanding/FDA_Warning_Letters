name: FDA Warning Letters Monitor

on:
  workflow_dispatch: # 必须保留，供 cron-job.org 调用

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance lxml deep-translator

      - name: Run Warning Letters Scanner
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python fda_warning_scanner.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 确保这两个文件都存在并被追踪
          touch seen_warning_letters.txt last_success_date.txt
          git add seen_warning_letters.txt last_success_date.txt
          # 检查是否有变化，有变化则提交并推送
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update DB and Success Status"
            git push
          fi
